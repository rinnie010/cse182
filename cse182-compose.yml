name: 'cse_182_postgresql'

services:
  postgres:
    container_name: container-psql
    image: postgres:15.17
    hostname: localhost
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cse182
      POSTGRES_PASSWORD: database4me
      POSTGRES_DB: cse182
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
